<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Our Story</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap');
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at 50% 30%, #1a0008, #000 70%); color: #ff4d6d; font-family: 'Cairo', sans-serif; direction: rtl; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { text-align: center; z-index: 10; }
        h1 { font-size: 50px; text-shadow: 0 0 20px #ff4d6d; animation: beat 2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        button { padding: 15px 40px; background: transparent; border: 2px solid #ff4d6d; color: #ff4d6d; border-radius: 50px; cursor: pointer; font-size: 20px; transition: 0.3s; font-family: 'Cairo'; }
        button:hover { background: #ff4d6d; color: #000; box-shadow: 0 0 30px #ff4d6d; }
        .heart { position: absolute; width: 15px; height: 15px; background: #ff4d6d; transform: rotate(45deg); animation: fly 6s linear infinite; opacity: 0; }
        .heart::before, .heart::after { content: ""; position: absolute; width: 15px; height: 15px; background: #ff4d6d; border-radius: 50%; }
        .heart::before { top: -8px; left: 0; } .heart::after { left: -8px; top: 0; }
        @keyframes fly { 0% { transform: translateY(100vh) rotate(45deg) scale(0.5); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-100vh) rotate(45deg) scale(1.2); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>قصتنا</h1>
        <button onclick="start()">شغّل اللحظة 🎵</button>
    </div>
    <audio id="music" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <script>
        function start() {
            var audio = document.getElementById('music');
            audio.currentTime = 38;
            audio.play();
        }
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 4) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
